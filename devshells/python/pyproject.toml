# NOTE: Linting rules: https://docs.astral.sh/ruff/linter/

[tool.ruff]
line-length = 80

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "N", "ANN", "SIM", "RUF"]

ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
typeCheckingMode = "strict"
reportMissingTypeStubs = false
